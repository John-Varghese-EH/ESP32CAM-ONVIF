name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:
    inputs:
      version:
        description: 'Firmware Version (e.g. 1.4.0)'
        required: true
        default: 'manual'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Need write permission to create release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Determine Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
            echo "TAG_NAME=v${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            # Extract version from tag (remove 'v' prefix)
            TAG_VERSION=${GITHUB_REF_NAME#v}
            echo "VERSION=$TAG_VERSION" >> $GITHUB_ENV
            echo "TAG_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          fi

      - name: Update Firmware Version in config.h
        run: |
          echo "Updating FIRMWARE_VERSION to v$VERSION in config.h"
          sed -i "s/#define FIRMWARE_VERSION \".*\"/#define FIRMWARE_VERSION \"v$VERSION\"/" ESP32CAM-ONVIF/config.h
          echo "--- Verification ---"
          grep FIRMWARE_VERSION ESP32CAM-ONVIF/config.h

      - name: Rebuild Web UI (index_html.h)
        run: |
          echo "Regenerating embedded WebUI header..."
          python utils/build_web.py
          echo "--- index_html.h size ---"
          ls -lh ESP32CAM-ONVIF/index_html.h

      - name: Build Firmware (esp32cam)
        run: pio run -e esp32cam

      - name: Build SPIFFS Filesystem Image
        run: pio run -e esp32cam -t buildfs

      - name: Rename build artifacts
        run: |
          cp .pio/build/esp32cam/firmware.bin esp32cam-onvif-${{ env.VERSION }}.bin
          cp .pio/build/esp32cam/spiffs.bin   esp32cam-onvif-${{ env.VERSION }}-spiffs.bin
          echo "--- Build Artifacts ---"
          ls -lh esp32cam-onvif-*.bin
          echo ""
          echo "Firmware SHA256:"
          sha256sum esp32cam-onvif-${{ env.VERSION }}.bin
          echo "SPIFFS SHA256:"
          sha256sum esp32cam-onvif-${{ env.VERSION }}-spiffs.bin

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            esp32cam-onvif-${{ env.VERSION }}.bin
            esp32cam-onvif-${{ env.VERSION }}-spiffs.bin
          name: "ESP32-CAM ONVIF v${{ env.VERSION }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Firmware v${{ env.VERSION }}

            ### Download & Flash
            | File | Purpose | Flash Command |
            |------|---------|---------------|
            | `esp32cam-onvif-${{ env.VERSION }}.bin` | **Firmware** (OTA-compatible) | `pio run -t upload` or WebUI OTA |
            | `esp32cam-onvif-${{ env.VERSION }}-spiffs.bin` | **SPIFFS Filesystem** | `pio run -t uploadfs` |

            ### OTA Update
            You can update directly from the Web UI:
            1. Open `http://<ESP32-IP>` → System → Firmware Update
            2. Click **Check for Updates** to auto-detect this release
            3. Click **Install** to flash over-the-air

            Or upload the `.bin` file manually via the **Manual Upload** option.

      - name: Upload Artifacts (for workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: esp32cam-onvif-${{ env.VERSION }}
          path: |
            esp32cam-onvif-${{ env.VERSION }}.bin
            esp32cam-onvif-${{ env.VERSION }}-spiffs.bin
